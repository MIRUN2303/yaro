<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YARO Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.cdnfonts.com/css/pilowlava" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(196,181,253,0.15);
  --border-light: rgba(255,255,255,0.06);
  --text: #f0f0f0;
  --muted: #666;
  --accent: #c4b5fd;
  --accent2: #a78bfa;
  --accent-dim: rgba(196,181,253,0.12);
  --danger: #ef4444;
  --success: #22c55e;
  --warn: #f59e0b;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; background: var(--bg); font-family: 'Clash Display', sans-serif; color: var(--text); }

/* ─── LOGIN SCREEN ─── */
#admin-login {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 30%, rgba(196,181,253,0.07) 0%, transparent 60%);
}
#admin-login.hidden { display: none; }
.login-card {
  width: 90%; max-width: 380px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(35px);
  -webkit-backdrop-filter: blur(35px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 36px 36px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 60px rgba(139,92,246,0.04), inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative;
}
.login-card::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 55%;
  max-width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,181,253,0.3), transparent);
  pointer-events: none;
}
.login-brand {
  font-family: 'Pilowlava', serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 0 20px rgba(139,92,246,0.3);
  margin-bottom: 2px;
}
.login-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 32px;
  position: relative;
  padding-bottom: 28px;
}
.login-sub::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,181,253,0.2), transparent);
}
.login-card input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Clash Display', sans-serif;
  transition: all 0.3s ease;
  text-align: center;
}
.login-card input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(196,181,253,0.06);
  box-shadow: 0 0 16px rgba(196,181,253,0.06);
}
.login-card input::placeholder { color: #444; letter-spacing: 0.05em; }
.login-card button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'Clash Display', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
}
.login-card button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(139,92,246,0.25);
}
.login-card .err { color: var(--danger); font-size: 12px; margin-top: 14px; }

/* ─── SITE HEADER (matches main site) ─── */
.site-header {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 52px;
  background: rgba(5,5,5,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
}
.site-header .sh-logo {
  font-family: 'Pilowlava', serif;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: #fff;
  text-decoration: none;
  text-shadow: 0 0 16px rgba(139,92,246,0.25);
}
.site-header .sh-nav {
  display: flex;
  align-items: center;
  gap: 20px;
}
.site-header .sh-nav a {
  color: rgba(255,255,255,0.45);
  text-decoration: none;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  position: relative;
  padding-bottom: 2px;
  transition: color 0.25s ease;
  cursor: pointer;
}
.site-header .sh-nav a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 1.5px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: right center;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
  border-radius: 2px;
}
.site-header .sh-nav a:hover::after,
.site-header .sh-nav a.active::after {
  transform: scaleX(1);
  transform-origin: left center;
}
.site-header .sh-nav a:hover,
.site-header .sh-nav a.active {
  color: var(--accent);
}
.back-store-btn {
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  font-size: 9px;
  letter-spacing: 0.1em;
  font-family: 'Clash Display', sans-serif;
  margin-left: 16px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  transition: all 0.25s ease;
  text-transform: uppercase;
  white-space: nowrap;
}
.back-store-btn:hover {
  color: var(--accent);
  border-color: rgba(196,181,253,0.2);
  background: rgba(196,181,253,0.06);
}
.site-header .sh-nav .admin-email {
  font-size: 9px;
  opacity: 0.35;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.1em;
  pointer-events: none;
}
.site-header .sh-nav .sign-out {
  color: rgba(239,68,68,0.6);
}
.site-header .sh-nav .sign-out:hover {
  color: #ef4444;
}
.site-header .sh-nav .sign-out::after { display: none; }

/* ─── ADMIN APP ─── */
#admin-app { display: none; padding-top: 52px; min-height: 100vh; }
#admin-app.active { display: block; }

/* ─── CONTENT AREA ─── */
#admin-main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 28px;
}

/* ─── PAGE HEADER ─── */
.page-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}
.page-hdr h2 {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.8);
}

/* ─── STATS GRID ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.stat-card {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 24px 22px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.stat-card:hover {
  border-color: rgba(196,181,253,0.2);
  background: rgba(255,255,255,0.03);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,181,253,0.15), transparent);
}
.stat-card .val {
  font-size: 30px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.stat-card .lbl {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'Clash Display', sans-serif;
  transition: all 0.3s ease;
}
.btn-pri {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
}
.btn-pri:hover {
  opacity: 0.85;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(139,92,246,0.2);
}
.btn-del {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.15);
}
.btn-del:hover {
  background: rgba(239,68,68,0.2);
}
.btn-sm {
  padding: 6px 14px;
  font-size: 9px;
  letter-spacing: 0.08em;
}
.btn-ghost {
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.5);
  border: 1px solid var(--border-light);
}
.btn-ghost:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

/* ─── TABLE ─── */
.tbl-wrap {
  overflow-x: auto;
  background: rgba(255,255,255,0.015);
  backdrop-filter: blur(8px);
  border-radius: 14px;
  border: 1px solid var(--border-light);
  position: relative;
}
.tbl-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,181,253,0.1), transparent);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead th {
  padding: 14px 16px;
  text-align: left;
  font-weight: 500;
  color: rgba(255,255,255,0.25);
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  color: rgba(255,255,255,0.7);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td {
  background: rgba(196,181,253,0.03);
}
.acts { display: flex; gap: 6px; }

/* ─── BADGE ─── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 9px;
  letter-spacing: 0.08em;
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.35);
  border: 1px solid rgba(255,255,255,0.06);
  text-transform: capitalize;
}
.badge-suc {
  background: rgba(34,197,94,0.08);
  color: var(--success);
  border-color: rgba(34,197,94,0.15);
}
.badge-warn {
  background: rgba(245,158,11,0.08);
  color: var(--warn);
  border-color: rgba(245,158,11,0.15);
}
.badge-dng {
  background: rgba(239,68,68,0.08);
  color: var(--danger);
  border-color: rgba(239,68,68,0.15);
}

/* ─── THUMBNAIL ─── */
img.thumb {
  width: 40px; height: 48px;
  object-fit: cover;
  border-radius: 6px;
  background: var(--surface);
}

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,5,5,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.modal-overlay.open { display: flex; }
.modal {
  background: rgba(15,10,25,0.75);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(196,181,253,0.12);
  border-radius: 18px;
  width: 90%;
  max-width: 540px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 36px 32px 32px;
  box-shadow: 0 30px 100px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  transform: scale(0.95);
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
.modal-overlay.open .modal { transform: scale(1); }
.modal::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 50%;
  max-width: 180px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,181,253,0.25), transparent);
}
.modal h3 {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 24px;
  color: rgba(255,255,255,0.8);
}
.modal .close {
  position: absolute;
  top: 14px; right: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.25);
  font-size: 14px;
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
}
.modal .close:hover {
  color: #fff;
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.12);
}

/* ─── FORM ─── */
.fg { margin-bottom: 14px; }
.fg label {
  display: block;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.fg input, .fg textarea, .fg select {
  width: 100%;
  padding: 11px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Clash Display', sans-serif;
  transition: all 0.3s ease;
}
.fg input:focus, .fg textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(196,181,253,0.05);
  box-shadow: 0 0 12px rgba(196,181,253,0.05);
}
.fg textarea { min-height: 70px; resize: vertical; }
.fg select { cursor: pointer; }
.fg select option { background: #0f0a19; color: var(--text); }
.fr { display: flex; gap: 10px; }
.fr .fg { flex: 1; }
.no-data { text-align: center; color: rgba(255,255,255,0.2); padding: 40px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

/* ─── RESPONSIVE ─── */
@media (max-width: 820px) {
  .site-header { height: 46px; padding: 0 14px; }
  .site-header .sh-logo { font-size: 15px; }
  .site-header .sh-nav { gap: 12px; }
  .site-header .sh-nav a { font-size: 8px; letter-spacing: 0.12em; }
  .site-header .sh-nav .admin-email { display: none; }
  #admin-main { padding: 20px 14px; }
  .page-hdr h2 { font-size: 14px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 18px; }
  .stat-card .val { font-size: 24px; }
  .fr { flex-direction: column; gap: 0; }
  .modal { padding: 28px 20px 24px; }
  tbody td { font-size: 11px; padding: 10px 12px; }
  thead th { font-size: 8px; padding: 12px; }
}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="admin-login">
  <div class="login-card">
    <div class="login-brand">YARO</div>
    <div class="login-sub">Admin Access</div>
    <input type="email" id="adm-email" placeholder="Admin Email" autocomplete="email">
    <input type="password" id="adm-pass" placeholder="Password" autocomplete="current-password">
    <button id="adm-login-btn">Sign In</button>
    <div class="err" id="adm-err"></div>
  </div>
</div>

<!-- ─── ADMIN SHELL ─── -->
<div id="admin-app">
  <header class="site-header">
    <a href="/" class="sh-logo">YARO</a>
    <a href="/" class="back-store-btn">&larr; Store</a>
    <nav class="sh-nav">
      <a class="active" data-page="dashboard">Dashboard</a>
      <a data-page="collections">Collections</a>
      <a data-page="stories">Stories</a>
      <a data-page="products">Products</a>
      <a data-page="orders">Orders</a>
      <span class="admin-email" id="admin-email"></span>
      <a class="sign-out" id="adm-logout">Sign Out</a>
    </nav>
  </header>
  <main id="admin-main"><div id="page-content"></div></main>
</div>

<!-- ─── MODAL ─── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="close" id="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
var adminToken = localStorage.getItem('admin_token');

function esc(s) { var d = document.createElement('div'); d.appendChild(document.createTextNode(s || '')); return d.innerHTML; }
function fixImg(src) { if (!src) return ''; if (src.indexOf('://') > -1 || src[0] === '/') return src; return '/' + src; }

function openModal(h) {
  document.getElementById('modal-body').innerHTML = h;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ─── AUTH ───
if (adminToken) { showApp(); loadPage('dashboard'); }

document.getElementById('adm-login-btn').addEventListener('click', async function() {
  var email = document.getElementById('adm-email').value.trim();
  var pass = document.getElementById('adm-pass').value;
  var errEl = document.getElementById('adm-err');
  errEl.textContent = '';
  try {
    var result = await YARO_API.adminLogin(email, pass);
    if (result.error) { errEl.textContent = result.error; return; }
    adminToken = localStorage.getItem('admin_token');
    showApp();
    loadPage('dashboard');
  } catch(e) { errEl.textContent = 'Connection error'; }
});

document.getElementById('adm-logout').addEventListener('click', async function() {
  await YARO_API.adminLogout();
  adminToken = null;
  document.getElementById('admin-app').classList.remove('active');
  document.getElementById('admin-login').classList.remove('hidden');
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('admin-app').classList.contains('active')) {
    document.getElementById('adm-login-btn').click();
  }
});

function showApp() {
  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-app').classList.add('active');
  var u = YARO_API.getAdminEmail ? YARO_API.getAdminEmail() : (YARO_API.authUser ? YARO_API.authUser.email : '');
  if (u) document.getElementById('admin-email').textContent = u;
}

// ─── NAV ───
document.querySelectorAll('.site-header .sh-nav a[data-page]').forEach(function(a) {
  a.addEventListener('click', function() {
    document.querySelectorAll('.site-header .sh-nav a[data-page]').forEach(function(x) { x.classList.remove('active'); });
    this.classList.add('active');
    loadPage(this.dataset.page);
  });
});

function loadPage(page) {
  var c = document.getElementById('page-content');
  switch(page) {
    case 'dashboard': renderDashboard(c); break;
    case 'collections': renderCollections(c); break;
    case 'stories': renderStories(c); break;
    case 'products': renderProducts(c); break;
    case 'orders': renderOrders(c); break;
  }
}

// ─── DASHBOARD ───
async function renderDashboard(c) {
  try {
    var [cols, prods, ords] = await Promise.all([YARO_API.getCollections(), YARO_API.getProducts(), YARO_API.getOrders()]);
    c.innerHTML = '<div class="page-hdr"><h2>Dashboard</h2></div><div class="stat-grid">' +
      '<div class="stat-card"><div class="val">' + (Array.isArray(cols)?cols.length:0) + '</div><div class="lbl">Collections</div></div>' +
      '<div class="stat-card"><div class="val">' + (Array.isArray(prods)?prods.length:0) + '</div><div class="lbl">Products</div></div>' +
      '<div class="stat-card"><div class="val">' + (Array.isArray(ords)?ords.length:0) + '</div><div class="lbl">Orders</div></div></div>';
  } catch(e) { c.innerHTML = '<p>Error loading dashboard</p>'; }
}

// ─── COLLECTIONS ───
async function renderCollections(c) {
  var data = await YARO_API.getCollections();
  var items = Array.isArray(data) ? data : [];
  c.innerHTML = '<div class="page-hdr"><h2>Collections</h2><button class="btn btn-pri" onclick="openColModal()">+ Add</button></div>' +
    '<div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Slug</th><th>Description</th><th>Actions</th></tr></thead><tbody>' +
    items.map(function(x) {

// ─── PRODUCTS ───
async function renderProducts(c) {
  var [prods, cols, stories] = await Promise.all([YARO_API.getProducts(), YARO_API.getCollections(), YARO_API.getStories()]);
  var items = Array.isArray(prods) ? prods : [];
  var cm = {}; (Array.isArray(cols)?cols:[]).forEach(function(x) { cm[x.id] = x.name; });
  c.innerHTML = '<div class="page-hdr"><h2>Products</h2><button class="btn btn-pri" onclick="openProdModal()">+ Add</button></div>' +
    '<div class="tbl-wrap"><table><thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Collection</th><th>Gender</th><th>Status</th><th>Actions</th></tr></thead><tbody>' +
    items.map(function(p) {
      return '<tr><td>' + (p.images&&p.images[0]?'<img class="thumb" src="'+fixImg(p.images[0])+'">':'-') + '</td><td><strong style="color:rgba(255,255,255,0.85)">' + esc(p.name) + '</strong></td><td>₹' + (p.price||0) + '</td><td>' + (p.stock||0) + '</td><td style="color:rgba(255,255,255,0.5)">' + esc(cm[p.collection_id]||'-') + '</td><td style="color:rgba(255,255,255,0.5)">' + esc(p.gender||'Any') + '</td><td><span class="badge ' + (p.status==='active'?'badge-suc':'badge-warn') + '">' + esc(p.status) + '</span></td><td class="acts"><button class="btn btn-sm btn-pri" onclick="openProdModal(\'' + p.id + '\')">Edit</button><button class="btn btn-sm btn-del" onclick="delItem(\'products\',\'' + p.id + '\')">Delete</button></td></tr>';
    }).join('') + '</tbody></table></div>';
}

async function openProdModal(id) {
  var [cols, stories] = await Promise.all([YARO_API.getCollections(), YARO_API.getStories()]);
  var h = '<h3>' + (id?'Edit':'Add') + ' Product</h3><form id="mf">';
  h += '<div class="fr"><div class="fg"><label>Collection</label><select id="f-collection"><option value="">None</option>';
  (Array.isArray(cols)?cols:[]).forEach(function(c) { h += '<option value="' + c.id + '">' + esc(c.name) + '</option>'; });
  h += '</select></div><div class="fg"><label>Story</label><select id="f-story"><option value="">None</option>';
  (Array.isArray(stories)?stories:[]).forEach(function(s) { h += '<option value="' + s.id + '">' + esc(s.title) + '</option>'; });
  h += '</select></div></div>';
  h += '<div class="fr"><div class="fg"><label>Name</label><input type="text" id="f-name" required></div>';
  h += '<div class="fg"><label>Slug</label><input type="text" id="f-slug" required></div></div>';
  h += '<div class="fg"><label>Description</label><textarea id="f-desc"></textarea></div>';
  h += '<div class="fr"><div class="fg"><label>Price (₹)</label><input type="number" id="f-price"></div>';
  h += '<div class="fg"><label>Original Price</label><input type="number" id="f-oprice"></div></div>';
  h += '<div class="fr"><div class="fg"><label>Stock</label><input type="number" id="f-stock"></div>';
  h += '<div class="fg"><label>SKU</label><input type="text" id="f-sku"></div></div>';
  h += '<div class="fg"><label>Images (comma-separated)</label><input type="text" id="f-images"></div>';
  h += '<div class="fg"><label>Sizes (comma-separated)</label><input type="text" id="f-sizes"></div>';
  h += '<div class="fg"><label>Gender</label><select id="f-gender"><option value="Any">Any</option><option value="His">His</option><option value="Hers">Hers</option><option value="Mini">Mini</option><option value="Mini-Gent">Mini-Gent</option><option value="Mini-Lady">Mini-Lady</option></select></div>';
  h += '<div class="fr"><div class="fg"><label>Badge</label><input type="text" id="f-badge"></div>';
  h += '<div class="fg"><label>Offer Name</label><input type="text" id="f-offer"></div></div>';
  h += '<div class="fg"><label>Story Text</label><textarea id="f-story-text"></textarea></div>';
  h += '<div class="fg"><label>Status</label><select id="f-status"><option value="active">Active</option><option value="draft">Draft</option></select></div>';
  h += '<button type="submit" class="btn btn-pri">Save</button></form>';
  openModal(h);
  if (id) loadProd(id);
  document.getElementById('mf').addEventListener('submit', function(e) { e.preventDefault(); saveProd(id); });
}

async function loadProd(id) {
  var prods = await YARO_API.getProducts();
  var d = null;
  for (var i = 0; i < prods.length; i++) { if (prods[i].id === id) { d = prods[i]; break; } }
  if (!d) return;
  document.getElementById('f-collection').value = d.collection_id || '';
  document.getElementById('f-story').value = d.story_id || '';
  document.getElementById('f-name').value = d.name || '';
  document.getElementById('f-slug').value = d.slug || '';
  document.getElementById('f-desc').value = d.description || '';
  document.getElementById('f-price').value = d.price || '';
  document.getElementById('f-oprice').value = d.original_price || '';
  document.getElementById('f-stock').value = d.stock || '';
  document.getElementById('f-sku').value = d.sku || '';
  document.getElementById('f-images').value = (d.images||[]).join(', ');
  document.getElementById('f-sizes').value = (d.sizes||[]).join(', ');
  document.getElementById('f-gender').value = d.gender || 'Any';
  document.getElementById('f-badge').value = d.badge || '';
  document.getElementById('f-offer').value = d.offer_name || '';
  document.getElementById('f-story-text').value = d.story_text || '';
  document.getElementById('f-status').value = d.status || 'active';
}

async function saveProd(id) {
  var body = {
    collection_id: document.getElementById('f-collection').value || null,
    story_id: document.getElementById('f-story').value || null,
    name: document.getElementById('f-name').value,
    slug: document.getElementById('f-slug').value,
    description: document.getElementById('f-desc').value,
    price: parseInt(document.getElementById('f-price').value) || 0,
    original_price: parseInt(document.getElementById('f-oprice').value) || null,
    stock: parseInt(document.getElementById('f-stock').value) || 0,
    sku: document.getElementById('f-sku').value,
    images: document.getElementById('f-images').value.split(',').map(function(s){return s.trim()}).filter(Boolean),
    sizes: document.getElementById('f-sizes').value.split(',').map(function(s){return s.trim()}).filter(Boolean),
    gender: document.getElementById('f-gender').value,
    badge: document.getElementById('f-badge').value,
    offer_name: document.getElementById('f-offer').value,
    story_text: document.getElementById('f-story-text').value,
    status: document.getElementById('f-status').value
  };
  var r = id ? await YARO_API.updateProduct(id, body) : await YARO_API.createProduct(body);
  if (r.error) { alert('Error: ' + JSON.stringify(r.error)); return; }
  closeModal(); loadPage('products');
}

// ─── ORDERS ───
async function renderOrders(c) {
  var data = await YARO_API.getOrders();
  var items = Array.isArray(data) ? data : [];
  c.innerHTML = '<div class="page-hdr"><h2>Orders</h2></div>' +
    '<div class="tbl-wrap"><table><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Payment</th><th>Fulfillment</th><th>Date</th><th>Actions</th></tr></thead><tbody>' +
    (items.length ? items.map(function(o) {
      return '<tr><td><strong style="color:rgba(255,255,255,0.85)">' + esc(o.order_number) + '</strong></td><td style="color:rgba(255,255,255,0.5)">' + esc(o.user_id||'-') + '</td><td>₹' + ((o.total||0)/100).toFixed(2) + '</td><td><span class="badge ' + (o.payment_status==='confirmed'?'badge-suc':o.payment_status==='failed'?'badge-dng':'badge-warn') + '">' + esc(o.payment_status) + '</span></td><td><span class="badge ' + (o.fulfillment_status==='shipped'||o.fulfillment_status==='delivered'?'badge-suc':'badge-warn') + '">' + esc(o.fulfillment_status) + '</span></td><td style="color:rgba(255,255,255,0.35)">' + (o.created_at?new Date(o.created_at).toLocaleDateString():'-') + '</td><td class="acts"><button class="btn btn-sm btn-pri" onclick="updateOrder(\'' + o.id + '\')">Update</button></td></tr>';
    }).join('') : '<tr><td colspan="7" class="no-data">No orders yet</td></tr>') + '</tbody></table></div>';
}

function updateOrder(id) {
  var h = '<h3>Update Order Status</h3><form id="mf">';
  h += '<div class="fg"><label>Payment</label><select id="f-pstatus"><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="failed">Failed</option><option value="refunded">Refunded</option></select></div>';
  h += '<div class="fg"><label>Fulfillment</label><select id="f-fstatus"><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option></select></div>';
  h += '<button type="submit" class="btn btn-pri">Update</button></form>';
  openModal(h);
  document.getElementById('mf').addEventListener('submit', async function(e) {
    e.preventDefault();
    var body = {
      payment_status: document.getElementById('f-pstatus').value,
      fulfillment_status: document.getElementById('f-fstatus').value
    };
    var r = await YARO_API.updateOrder(id, body);
    if (r.error) { alert('Error: ' + JSON.stringify(r.error)); return; }
    closeModal(); loadPage('orders');
  });
}

// ─── DELETE ───
async function delItem(type, id) {
  if (!confirm('Delete this ' + type.slice(0,-1) + '?')) return;
  var r;
  switch(type) {
    case 'collections': r = await YARO_API.deleteCollection(id); break;
    case 'stories': r = await YARO_API.deleteStory(id); break;
    case 'products': r = await YARO_API.deleteProduct(id); break;
    case 'orders': r = await YARO_API.updateOrder(id, { status: 'cancelled' }); break;
  }
  if (r && r.error) { alert('Error: ' + JSON.stringify(r.error)); return; }
  loadPage(type);
}

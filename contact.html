<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YARO | Contact</title>
  <meta name="description" content="Get in touch with YARO. Client support and brand communications.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/pilowlava" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --card-bg: rgba(20, 10, 40, 0.4);
      --card-hover: rgba(30, 15, 55, 0.55);
      --border: rgba(196, 181, 253, 0.15);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
      --text-very-muted: rgba(255,255,255,0.25);
      --accent: #c4b5fd;
      --accent-dim: rgba(196, 181, 253, 0.12);
      --neon-violet: #a78bfa;
      --danger: #ef4444;
      --success: #22c55e;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Clash Display', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    /* ─── PAGE TRANSITION ─── */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 99999;
      pointer-events: none;
      background: #070509;
      opacity: 0;
      visibility: hidden;
      backdrop-filter: blur(0px);
      transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  backdrop-filter 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.25s;
    }

    .page-transition::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .page-transition.active {
      opacity: 1;
      visibility: visible;
      backdrop-filter: blur(20px);
      pointer-events: all;
    }

    .page-transition.active::after {
      opacity: 1;
    }

    /* ─── FRAME & LAYOUT ─── */
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .page-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 130px;
      overflow: hidden;
    }

    .glass-frame {
      position: relative;
      width: calc(100% - 28px);
      max-width: 700px;
      margin: 0 14px;
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: calc(100vh - 75px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.09) 0%, transparent 2.5%),
        linear-gradient(90deg, rgba(255,255,255,0.06) 0%, transparent 1.5%),
        linear-gradient(0deg, rgba(0,0,0,0.25) 0%, transparent 3%),
        linear-gradient(270deg, rgba(0,0,0,0.15) 0%, transparent 2%),
        radial-gradient(ellipse 50% 40% at 50% 110%, rgba(58,20,90,0.2) 0%, transparent 75%),
        #0A0A0A;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.16);
      border-bottom-color: rgba(0,0,0,0.3);
      border-right-color: rgba(0,0,0,0.2);
      box-shadow: 0 30px 100px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .glass-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.25;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 10;
    }

    .ambient-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 2;
    }

    .glow-1 {
      width: 350px; height: 300px;
      top: -10%; right: 10%;
      background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
    }

    .frame-content {
      position: relative;
      z-index: 5;
      padding: 24px 36px 20px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .reveal-item {
      opacity: 0;
      transform: translateY(12px);
    }

    /* ─── CONTACT FORM ─── */
    .contact-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .contact-subtitle {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--neon-violet);
      margin-bottom: 8px;
    }

    .contact-title {
      font-family: 'Clash Display', sans-serif;
      font-weight: 600;
      font-size: 38px;
      color: #fff;
      text-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
    }

    .form-group {
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      font-family: inherit;
      font-size: 13px;
      color: #fff;
      outline: none;
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .form-input:focus {
      border-color: var(--neon-violet);
      background: rgba(196, 181, 253, 0.04);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
    }
    .form-input[readonly] {
      opacity: 0.6;
      cursor: default;
      background: rgba(255,255,255,0.01);
      border-color: rgba(255,255,255,0.04);
    }
    .form-input[readonly]:focus {
      border-color: rgba(255,255,255,0.04);
      box-shadow: none;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.15);
    }

    #contact-form { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .form-group:has(textarea) { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    textarea.form-input {
      flex: 1;
      min-height: 120px;
      resize: none;
      overflow-y: auto;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--neon-violet);
      color: #000;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover {
      background: #c4b5fd;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(167, 139, 250, 0.2);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .site-footer { position: fixed; bottom: 0; width: 100%; z-index: 50; }

    /* ─── TOAST NOTIFICATION ─── */
    .toast-container {
      position: fixed; top: 80px; right: 20px; z-index: 6000;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 14px 20px; border-radius: 10px;
      background: rgba(15,10,25,0.95); border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: #fff; min-width: 280px;
      transform: translateX(120%); opacity: 0;
      transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,0.15); }
    .toast.success .toast-icon { color: var(--success); }
    .toast.error { border-color: rgba(239,68,68,0.15); }
    .toast.error .toast-icon { color: var(--danger); }
    .toast-icon { font-size: 16px; flex-shrink: 0; }
    .toast-text { flex: 1; }

    @media (max-width: 600px) {
      .frame-content { padding: 40px 20px; }
      .contact-title { font-size: 30px; }
      .form-input { padding: 12px 14px; }
    }

    /* ─── CURSOR ─── */
    * { cursor: none !important; }

    @media (max-width: 820px), (hover: none) and (pointer: coarse) {
      .cursor-dot, .cursor-ring, #cursor-canvas {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
      * { cursor: auto !important; }
    }

    .cursor-dot {
      position: fixed; top: 0; left: 0; width: 3px; height: 3px;
      background: #fff; border-radius: 50%; pointer-events: none;
      z-index: 99999; will-change: transform;
      transition: width 0.4s cubic-bezier(0.22,1,0.36,1), height 0.4s cubic-bezier(0.22,1,0.36,1), background 0.3s ease, opacity 0.3s ease;
    }

    .cursor-ring {
      position: fixed; top: 0; left: 0; width: 24px; height: 24px;
      border: 0.5px solid rgba(255,255,255,0.12); border-radius: 50%;
      pointer-events: none; z-index: 99998; will-change: transform;
      transition: width 0.6s cubic-bezier(0.22,1,0.36,1), height 0.6s cubic-bezier(0.22,1,0.36,1), border-color 0.5s ease, border-width 0.5s ease, opacity 0.4s ease, background 0.5s ease;
    }

    .cursor-ring::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: calc(100% - 2px); height: calc(100% - 2px);
      border-radius: 50%; transform: translate(-50%, -50%);
      background: conic-gradient(from 0deg, transparent 0deg, rgba(139,92,246,0.15) 50deg, rgba(168,85,247,0.2) 90deg, rgba(192,132,252,0.1) 140deg, rgba(139,92,246,0.18) 200deg, rgba(168,85,247,0.12) 260deg, transparent 320deg);
      opacity: 0; transition: opacity 0.5s ease;
      pointer-events: none; animation: lavaSpin 2.5s linear infinite;
    }

    body:has(a:hover, button:hover) .cursor-dot {
      width: 3px; height: 3px; background: rgba(139, 92, 246, 1);
    }
    body:has(a:hover, button:hover) .cursor-ring {
      width: 40px; height: 40px; border-width: 1.5px; border-color: rgba(168, 85, 247, 0.6);
      background: rgba(139, 92, 246, 0.06);
      box-shadow: 0 0 22px rgba(168, 85, 247, 0.3), 0 0 50px rgba(139, 92, 246, 0.12);
    }
    body:has(a:hover, button:hover) .cursor-ring::after {
      opacity: 1;
    }

    .cursor-dot.hovering, .cursor-dot.on-logo {
      width: 3px; height: 3px; background: rgba(168, 85, 247, 1);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.7);
    }
    .cursor-ring.hovering, .cursor-ring.on-logo {
      width: 40px; height: 40px; border-width: 1.5px; border-color: rgba(168, 85, 247, 0.6);
      background: rgba(139, 92, 246, 0.06);
      box-shadow: 0 0 22px rgba(168, 85, 247, 0.3), 0 0 50px rgba(139, 92, 246, 0.12);
    }
    .cursor-ring.hovering::after, .cursor-ring.on-logo::after { opacity: 1; }

    body:active .cursor-dot, .cursor-dot.clicking { width: 2px; height: 2px; opacity: 0.6; }
    body:active .cursor-ring, .cursor-ring.clicking {
      width: 20px; height: 20px; border-color: rgba(139, 92, 246, 0.15); border-width: 0.5px;
    }

    .cursor-dot.hidden, .cursor-ring.hidden { opacity: 0; }
    .cursor-label { display: none; }

    #cursor-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 99997;
    }

    @keyframes lavaSpin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

  </style>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <script src="js/header.js"></script>

  <div class="page-wrap">
    <div class="glass-frame">
      <div class="ambient-glow glow-1"></div>

      <div class="frame-content">

        <!-- Header -->
        <div class="contact-header reveal-item">
          <div class="contact-subtitle">Get in Touch</div>
          <h2 class="contact-title">CLIENT SUPPORT</h2>
        </div>

        <!-- Form -->
        <form id="contact-form" onsubmit="return false;" class="reveal-item">
          <div class="form-group">
            <label class="form-label" for="contact-name">Your Name</label>
            <input type="text" id="contact-name" class="form-input" placeholder="e.g. Liam Cross" readonly required>
          </div>

          <div class="form-group">
            <label class="form-label" for="contact-email">Email Address</label>
            <input type="email" id="contact-email" class="form-input" placeholder="e.g. liam@domain.com" readonly required>
          </div>

          <div class="form-group">
            <label class="form-label" for="contact-order">Order Reference (Optional)</label>
            <input type="text" id="contact-order" class="form-input" placeholder="e.g. YARO-20260527-ABCD">
          </div>

          <div class="form-group">
            <label class="form-label" for="contact-message">Your Message</label>
            <textarea id="contact-message" class="form-input" placeholder="How can we assist you?" required></textarea>
          </div>

          <button type="submit" class="submit-btn" id="contact-submit">
            <span>Send Message</span>
          </button>
        </form>

      </div>

      <script src="js/footer.js"></script>

    </div>

    <!-- Page Transition Overlay -->
    <div class="page-transition" id="page-transition"></div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Mobile Menu -->
  <div class="mobile-menu-overlay" id="mobile-menu">
    <div class="mobile-menu-drawer">
      <button class="mobile-menu-close" id="mobile-menu-close">&#10005;</button>
      <div class="mobile-menu-user">Welcome, <strong id="mobile-user-name">Guest</strong></div>
      <nav class="mobile-menu-nav">
        <a href="index.html">Home</a>
        <a href="store.html" class="store-nav-trigger">Store</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="profile.html">Profile</a>
        <a href="orders.html">Orders</a>
        <a href="admin.html" id="mobile-admin-link" style="display:none">Admin</a>
        <a href="cart.html" class="cart-link">Cart</a>
      </nav>
    </div>
  </div>

  <!-- Store Modal Overlay -->
  <div class="store-modal-overlay" id="store-modal">
    <div class="store-modal">
      <button class="store-modal-close" id="store-modal-close" title="Close">✕</button>
      <h3 class="store-modal-title">Our Store</h3>
      <p class="store-modal-subtitle">Choose a Collection</p>
      <div class="store-collections-list">
        <a href="store.html" class="store-collection-opt">
          <span class="dot">◎</span> General
        </a>
        <a href="store.html?collection=Night+Ride" class="store-collection-opt">
          <span class="dot">○</span> Night Ride
        </a>
        <a href="store.html?collection=Urban+Echo" class="store-collection-opt">
          <span class="dot">○</span> Urban Echo
        </a>
        <a href="store.html?collection=Midnight+Society" class="store-collection-opt">
          <span class="dot">○</span> Midnight Society
        </a>
        <a href="store.html?collection=Wander" class="store-collection-opt">
          <span class="dot">○</span> Wander
        </a>
      </div>
    </div>
  </div>

  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <canvas id="cursor-canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Page reveal animation
    (function() {
      var overlay = document.getElementById('page-transition');
      if (overlay) {
        setTimeout(function() {
          var items = document.querySelectorAll('.reveal-item');
          gsap.set(items, { opacity: 0, y: 8, scale: 0.98, filter: 'blur(4px)' });
          gsap.to(items, {
            opacity: 1,
            y: 0,
            scale: 1,
            filter: 'blur(0px)',
            duration: 0.5,
            stagger: 0.05,
            ease: 'power2.out'
          });
        }, 120);
      }
    })();

    window.addEventListener('pageshow', function() {
      var o = document.getElementById('page-transition');
      if (o) o.classList.remove('active');
    });
    
    // Intercept internal links exit transition
    document.querySelectorAll('.site-header .sh-nav a, .site-footer .sf-links a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        if (!href || href === '#' || href.startsWith('http') || href.startsWith('file:')) return;
        e.preventDefault();
        var overlay = document.getElementById('page-transition');
        var frame = document.querySelector('.glass-frame');
        if (overlay) {
          gsap.to(frame, { scale: 0.96, opacity: 0, duration: 0.18, ease: 'power2.in', overwrite: 'auto' });
          overlay.classList.add('active');
          setTimeout(function() { window.location.href = href; }, 280);
        } else {
          window.location.href = href;
        }
      });
    });

    // ─── STORE POPUP MODAL HANDLERS ───
    (function() {
      const storeModal = document.getElementById('store-modal');
      const storeClose = document.getElementById('store-modal-close');

      document.querySelectorAll('.store-nav-trigger').forEach(function(trigger) {
        trigger.addEventListener('click', function(e) {
          if (trigger.tagName === 'A') return;
          e.preventDefault();
          e.stopPropagation();
          if (storeModal) {
            storeModal.classList.add('open');
            document.body.style.overflow = 'hidden';
          }
        });
      });

      if (storeClose && storeModal) {
        const closeStoreModal = function() {
          storeModal.classList.remove('open');
          document.body.style.overflow = '';
        };
        storeClose.addEventListener('click', closeStoreModal);
        storeModal.addEventListener('click', function(e) {
          if (e.target === storeModal) closeStoreModal();
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && storeModal.classList.contains('open')) {
            closeStoreModal();
          }
        });
      }

      document.querySelectorAll('.store-collection-opt').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var href = this.getAttribute('href');
          var overlay = document.getElementById('page-transition');
          var frame = document.querySelector('.glass-frame');
          
          if (storeModal) storeModal.classList.remove('open');
          document.body.style.overflow = '';

          if (overlay && frame) {
            gsap.to(frame, { scale: 0.96, opacity: 0, duration: 0.18, ease: 'power2.in', overwrite: 'auto' });
            overlay.classList.add('active');
            setTimeout(function() { window.location.href = href; }, 280);
          } else {
            window.location.href = href;
          }
        });
      });
    })();



    // ─── TOAST NOTIFICATION ───
    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toast-container');
      var icons = { success: '✓', error: '✕' };
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.innerHTML = '<span class="toast-icon">' + (icons[type] || '') + '</span><span class="toast-text">' + message + '</span>';
      container.appendChild(toast);
      requestAnimationFrame(function() { toast.classList.add('show'); });
      setTimeout(function() { toast.classList.remove('show'); setTimeout(function() { toast.remove(); }, 400); }, 3500);
    }

    // ─── PRE-FILL NAME & EMAIL FROM PROFILE ───
    (function() {
      try {
        var token = localStorage.getItem('sb_token');
        if (!token) return;
        fetch('https://hggaxgdiritrawbpyues.supabase.co/auth/v1/user', {
          headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnZ2F4Z2Rpcml0cmF3YnB5dWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTE1NjIsImV4cCI6MjA5NjQyNzU2Mn0.huBcWXCsLlTVW-_6VLOI4FRppb_72QJl-bhwsw2zynI', 'Authorization': 'Bearer ' + token }
        }).then(function(r) { return r.json(); }).then(function(u) {
          if (!u || u.error || !u.id) return;
          var meta = u.user_metadata || {};
          var name = meta.name || '';
          var email = u.email || '';
          if (name) document.getElementById('contact-name').value = name;
          if (email) document.getElementById('contact-email').value = email;
        }).catch(function() {});
      } catch(e) {}
    })();

    // ─── FORM SUBMISSION ───
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('contact-submit');
      var name = document.getElementById('contact-name').value.trim();
      var email = document.getElementById('contact-email').value.trim();
      var order = document.getElementById('contact-order').value.trim();
      var message = document.getElementById('contact-message').value.trim();
      if (!name || !email || !message) { showToast('Please fill in all required fields', 'error'); return; }
      var originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span>Sending...</span>';
      
      // ─── SEND TO BACKEND (placeholder — YARO email TBD) ───
      var payload = { name: name, email: email, order: order, message: message };
      console.log('Contact form:', payload);
      // TODO: POST payload to YARO email endpoint once mail ID is provided

      setTimeout(function() {
        showToast('Your message has been sent successfully. We will respond within 24 hours.', 'success');
        document.getElementById('contact-message').value = '';
        document.getElementById('contact-order').value = '';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }, 1500);
    });

    // Search + cart count handled by js/header.js

    // Mobile menu toggle
    (function() {
      var btn = document.getElementById('sh-menu-btn');
      var panel = document.getElementById('mobile-menu');
      var close = document.getElementById('mobile-menu-close');
      var nameEl = document.getElementById('mobile-user-name');
      if (nameEl) {
        try {
          var stored = localStorage.getItem('yaro_user');
          if (stored) nameEl.textContent = stored;
        } catch(e) {}
      }
      function openMenu() { if (panel) { panel.classList.add('open'); if (btn) btn.classList.add('open'); } }
      function closeMenu() { if (panel) { panel.classList.remove('open'); if (btn) btn.classList.remove('open'); } }
      if (btn) btn.addEventListener('click', openMenu);
      if (close) close.addEventListener('click', closeMenu);
      if (panel) panel.addEventListener('click', function(e) { if (e.target === panel) closeMenu(); });
    })();
  </script>
  <script>
  (function() {
    var dot = document.getElementById('cursor-dot');
    var ring = document.getElementById('cursor-ring');
    var canvas = document.getElementById('cursor-canvas');
    if (!dot || !ring || !canvas) return;
    var ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    var mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    var dotX = mouseX, dotY = mouseY;
    var ringX = mouseX, ringY = mouseY;
    var trail = [];
    var TRAIL_LENGTH = 18;
    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX; mouseY = e.clientY;
      trail.push({ x: mouseX, y: mouseY, life: 1 });
      if (trail.length > TRAIL_LENGTH) trail.shift();
    });
    function animateCursor() {
      dotX += (mouseX - dotX) * 0.25;
      dotY += (mouseY - dotY) * 0.25;
      ringX += (mouseX - ringX) * 0.1;
      ringY += (mouseY - ringY) * 0.1;
      dot.style.transform = 'translate3d(' + dotX + 'px, ' + dotY + 'px, 0) translate(-50%, -50%)';
      ring.style.transform = 'translate3d(' + ringX + 'px, ' + ringY + 'px, 0) translate(-50%, -50%)';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (trail.length > 2) {
        for (var i = trail.length - 1; i >= 0; i--) trail[i].life -= 0.045;
        ctx.lineCap = 'round';
        for (var i = 1; i < trail.length; i++) {
          var p = trail[i], pp = trail[i - 1];
          if (p.life <= 0 || pp.life <= 0) continue;
          ctx.beginPath();
          ctx.moveTo(pp.x, pp.y);
          ctx.lineTo(p.x, p.y);
          ctx.strokeStyle = 'rgba(167, 139, 250, ' + (p.life * 0.25) + ')';
          ctx.lineWidth = p.life * 1.2;
          ctx.stroke();
        }
        while (trail.length > 0 && trail[0].life <= 0) trail.shift();
      }
      requestAnimationFrame(animateCursor);
    }
    animateCursor();
  })();
  </script>

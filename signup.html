<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — YARO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.cdnfonts.com/css/pilowlava" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; background: #050505; font-family: 'Clash Display', sans-serif; color: #fff; overflow: hidden; }

  .glass-layer {
    position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.09) 0%, transparent 2%),
      linear-gradient(90deg, rgba(255,255,255,0.06) 0%, transparent 1.5%),
      linear-gradient(0deg, rgba(0,0,0,0.25) 0%, transparent 3%),
      linear-gradient(270deg, rgba(0,0,0,0.15) 0%, transparent 2%),
      radial-gradient(ellipse 25% 30% at 3% 3%, rgba(255,255,255,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 20% 25% at 97% 3%, rgba(255,255,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 18% 22% at 3% 97%, rgba(255,255,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 20% 25% at 97% 97%, rgba(255,255,255,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 110%, rgba(58,20,90,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 45% 40% at 15% 20%, rgba(45,15,75,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 35% 35% at 85% 30%, rgba(60,20,100,0.18) 0%, transparent 55%),
      #0A0A0A;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-top-color: rgba(255,255,255,0.22);
    border-left-color: rgba(255,255,255,0.16);
    border-bottom-color: rgba(0,0,0,0.3);
    border-right-color: rgba(0,0,0,0.2);
    box-shadow: 0 30px 100px rgba(0,0,0,0.7), 0 10px 40px rgba(0,0,0,0.5), inset 3px 3px 12px rgba(255,255,255,0.07), inset 1px 1px 3px rgba(255,255,255,0.14), inset -3px -3px 14px rgba(0,0,0,0.5), inset -1px -1px 4px rgba(0,0,0,0.25), 0 0 60px rgba(60,20,100,0.06);
  }
  .glass-layer::after {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px; pointer-events: none; z-index: 2;
  }
  .glass-layer::before {
    content: ''; position: absolute; inset: 0; opacity: 0.4; mix-blend-mode: overlay; z-index: 10;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px; pointer-events: none;
  }

  .obsidian-stone { position: fixed; pointer-events: none; z-index: 0; opacity: 0; animation: stoneReveal 2s ease-out 0.8s forwards; }
  .obsidian-stone svg { display: block; width: 100%; height: 100%; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); }
  .stone-l1 { width: 140px; height: 200px; left: 3%; top: 50%; transform: translateY(-55%); }
  .stone-l2 { width: 80px; height: 110px; left: 1%; top: 12%; transform: rotate(-8deg); }
  .stone-l3 { width: 70px; height: 100px; left: 6%; bottom: 8%; transform: rotate(5deg); }
  .stone-r1 { width: 140px; height: 200px; right: 3%; top: 50%; transform: translateY(-45%) scaleX(-1); }
  .stone-r2 { width: 80px; height: 110px; right: 1%; bottom: 10%; transform: rotate(8deg) scaleX(-1); }
  .stone-r3 { width: 70px; height: 100px; right: 6%; top: 8%; transform: rotate(-5deg) scaleX(-1); }
  .obsidian-stone svg .facet-highlight { animation: stoneShimmer 8s ease-in-out infinite; }
  .stone-l2 svg .facet-highlight, .stone-r2 svg .facet-highlight { animation-delay: 2s; }
  .stone-l3 svg .facet-highlight, .stone-r3 svg .facet-highlight { animation-delay: 4s; }
  @keyframes stoneReveal { to { opacity: 1; } }
  @keyframes stoneShimmer { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }

  .ambient-glow { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .glow-1 { width: 500px; height: 400px; bottom: -10%; left: 20%; background: radial-gradient(circle, rgba(60,20,100,0.4) 0%, transparent 70%); animation: glowPulse1 8s ease-in-out infinite; }
  .glow-2 { width: 350px; height: 350px; top: -5%; right: 10%; background: radial-gradient(circle, rgba(80,30,120,0.25) 0%, transparent 70%); animation: glowPulse2 10s ease-in-out infinite; }
  .glow-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(40,15,80,0.12) 0%, transparent 70%); animation: glowPulse3 12s ease-in-out infinite; }
  @keyframes glowPulse1 { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes glowPulse2 { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  @keyframes glowPulse3 { 0%,100% { opacity: 0.3; } 50% { opacity: 0.6; } }

  .dust { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .dust span { position: absolute; width: 2px; height: 2px; background: rgba(196,181,253,0.3); border-radius: 50%; animation: dustFloat linear infinite; }
  .dust span:nth-child(1) { left: 10%; top: 20%; animation-duration: 14s; animation-delay: 0s; }
  .dust span:nth-child(2) { left: 25%; top: 60%; animation-duration: 18s; animation-delay: 2s; width: 3px; height: 3px; }
  .dust span:nth-child(3) { left: 40%; top: 10%; animation-duration: 12s; animation-delay: 4s; }
  .dust span:nth-child(4) { left: 55%; top: 70%; animation-duration: 16s; animation-delay: 1s; width: 1.5px; height: 1.5px; }
  .dust span:nth-child(5) { left: 70%; top: 30%; animation-duration: 20s; animation-delay: 3s; }
  .dust span:nth-child(6) { left: 85%; top: 80%; animation-duration: 15s; animation-delay: 5s; width: 2.5px; height: 2.5px; }
  .dust span:nth-child(7) { left: 50%; top: 90%; animation-duration: 13s; animation-delay: 7s; }
  .dust span:nth-child(8) { left: 15%; top: 40%; animation-duration: 19s; animation-delay: 6s; }
  .dust span:nth-child(9) { left: 90%; top: 15%; animation-duration: 11s; animation-delay: 8s; }
  .dust span:nth-child(10) { left: 35%; top: 45%; animation-duration: 17s; animation-delay: 9s; }
  @keyframes dustFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-120vh) translateX(30px); opacity: 0; }
  }

  .auth-wrap { position: relative; z-index: 2; width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-box { width: 480px; background: rgba(10,8,18,0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 52px 44px; position: relative; box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 40px rgba(60,20,100,0.06), inset 0 1px 0 rgba(255,255,255,0.06); aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; }
  .auth-box::before { content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px; background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.03) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }

  .auth-logo { text-align: center; font-family: 'Pilowlava', serif; font-size: 28px; letter-spacing: -0.02em; color: #ffffff; margin-bottom: 16px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.3s forwards; }
  .auth-title { font-size: 20px; font-weight: 400; text-align: center; letter-spacing: 0.5px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.4s forwards; }
  .auth-sub { font-size: 12px; color: #a1a1aa; text-align: center; margin-bottom: 32px; letter-spacing: 0.5px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.5s forwards; }

  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .form-group { margin-bottom: 16px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.6s forwards; }
  .form-group:nth-child(2) { animation-delay: 0.65s; }
  .form-group:nth-child(3) { animation-delay: 0.7s; }
  .form-group:nth-child(4) { animation-delay: 0.75s; }
  .form-group input { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; font-family: 'Clash Display', sans-serif; }
  .form-group input:focus { border-color: #c4b5fd; background: rgba(196,181,253,0.04); box-shadow: 0 0 20px rgba(196,181,253,0.05); }
  .form-group input::placeholder { color: #555; }
  .form-group input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px rgba(10,8,18,1) inset !important; -webkit-text-fill-color: #fff !important; border-color: rgba(196,181,253,0.2); }

  .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 100px; background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 100%); color: #050505; font-family: 'Clash Display', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px; position: relative; overflow: hidden; opacity: 0; animation: fadeSlideUp 0.6s ease 0.8s forwards; }
  .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(196,181,253,0.2); }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%); opacity: 0; transition: opacity 0.3s; }
  .auth-btn:hover::after { opacity: 1; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .auth-error { font-size: 12px; color: #ef4444; text-align: center; margin-top: 12px; min-height: 18px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.85s forwards; }
  .auth-success { font-size: 12px; color: #22c55e; text-align: center; margin-top: 12px; min-height: 18px; opacity: 0; animation: fadeSlideUp 0.6s ease 0.85s forwards; }
  .auth-link { text-align: center; margin-top: 14px; font-size: 13px; color: #a1a1aa; opacity: 0; animation: fadeSlideUp 0.6s ease 0.9s forwards; }
  .auth-link a { color: #c4b5fd; text-decoration: none; transition: color 0.3s; }
  .auth-link a:hover { color: #d8d0ff; text-decoration: underline; }
  .auth-back { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.3s; opacity: 0; animation: fadeSlideUp 0.6s ease 0.95s forwards; }
  .auth-back:hover { color: rgba(255,255,255,0.6); }

  .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(5,5,5,0.2); border-top-color: #050505; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-btn.loading .btn-text { display: none; }
  .auth-btn.loading .spinner { display: inline-block; }

  @media (max-width: 820px) {
    .stone-l1, .stone-l2, .stone-l3, .stone-r1, .stone-r2, .stone-r3 { display: none !important; }
    .auth-box { width: 100%; max-width: 400px; aspect-ratio: auto; padding: 28px 24px; }
    .glass-layer { border: none; border-radius: 0; }
    .glass-layer::after { background-size: 40px 40px; }
  }
</style>
</head>
<body>

  <div class="glass-layer">
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>
  </div>

  <div class="obsidian-stone stone-l1">
    <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="ol1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a0a2e"/><stop offset="40%" stop-color="#0d0d0d"/><stop offset="70%" stop-color="#150825"/><stop offset="100%" stop-color="#0a0a15"/></linearGradient><linearGradient id="ol1h" x1="0%" y1="0%" x2="80%" y2="60%"><stop offset="0%" stop-color="rgba(140,100,200,0.3)"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
      <polygon points="60,2 110,40 115,110 80,155 30,148 5,95 10,35" fill="url(#ol1)" stroke="rgba(80,50,120,0.2)" stroke-width="0.5"/>
      <polygon points="60,2 110,40 80,90 30,70" fill="rgba(25,12,45,0.6)"/>
      <polygon points="110,40 115,110 80,90" fill="rgba(15,8,30,0.5)"/>
      <polygon class="facet-highlight" points="60,2 90,30 70,60 40,40" fill="url(#ol1h)"/>
    </svg>
  </div>
  <div class="obsidian-stone stone-l2">
    <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="ol2" x1="20%" y1="0%" x2="80%" y2="100%"><stop offset="0%" stop-color="#120820"/><stop offset="50%" stop-color="#080812"/><stop offset="100%" stop-color="#1a0e28"/></linearGradient></defs>
      <polygon points="50,3 90,30 95,90 60,125 15,105 5,50" fill="url(#ol2)" stroke="rgba(70,40,110,0.15)" stroke-width="0.5"/>
      <polygon points="50,3 90,30 60,65 25,45" fill="rgba(20,10,35,0.5)"/>
      <polygon class="facet-highlight" points="50,3 75,22 55,45 35,30" fill="rgba(130,90,190,0.15)"/>
    </svg>
  </div>
  <div class="obsidian-stone stone-l3">
    <svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="ol3" x1="0%" y1="20%" x2="100%" y2="80%"><stop offset="0%" stop-color="#0e0618"/><stop offset="50%" stop-color="#0a0a12"/><stop offset="100%" stop-color="#160a25"/></linearGradient></defs>
      <polygon points="45,3 82,25 85,85 55,115 10,95 5,40" fill="url(#ol3)" stroke="rgba(60,35,100,0.15)" stroke-width="0.5"/>
      <polygon class="facet-highlight" points="45,3 65,18 50,38 30,25" fill="rgba(110,75,170,0.12)"/>
    </svg>
  </div>
  <div class="obsidian-stone stone-r1">
    <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="or1" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a0a2e"/><stop offset="40%" stop-color="#0d0d0d"/><stop offset="70%" stop-color="#150825"/><stop offset="100%" stop-color="#0a0a15"/></linearGradient><linearGradient id="or1h" x1="100%" y1="0%" x2="20%" y2="60%"><stop offset="0%" stop-color="rgba(100,70,180,0.25)"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
      <polygon points="60,2 110,40 115,110 80,155 30,148 5,95 10,35" fill="url(#or1)" stroke="rgba(80,50,120,0.2)" stroke-width="0.5"/>
      <polygon class="facet-highlight" points="60,2 90,30 70,60 40,40" fill="url(#or1h)"/>
    </svg>
  </div>
  <div class="obsidian-stone stone-r2">
    <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="or2" x1="80%" y1="0%" x2="20%" y2="100%"><stop offset="0%" stop-color="#120820"/><stop offset="50%" stop-color="#080812"/><stop offset="100%" stop-color="#1a0e28"/></linearGradient></defs>
      <polygon points="50,3 90,30 95,90 60,125 15,105 5,50" fill="url(#or2)" stroke="rgba(70,40,110,0.15)" stroke-width="0.5"/>
      <polygon class="facet-highlight" points="50,3 75,22 55,45 35,30" fill="rgba(110,75,170,0.12)"/>
    </svg>
  </div>
  <div class="obsidian-stone stone-r3">
    <svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="or3" x1="100%" y1="20%" x2="0%" y2="80%"><stop offset="0%" stop-color="#0e0618"/><stop offset="50%" stop-color="#0a0a12"/><stop offset="100%" stop-color="#160a25"/></linearGradient></defs>
      <polygon points="45,3 82,25 85,85 55,115 10,95 5,40" fill="url(#or3)" stroke="rgba(60,35,100,0.15)" stroke-width="0.5"/>
      <polygon class="facet-highlight" points="45,3 65,18 50,38 30,25" fill="rgba(100,65,160,0.12)"/>
    </svg>
  </div>

  <div class="dust"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">YARO</div>
      <div class="auth-title">Join the Collective</div>
      <div class="auth-sub">Create your YARO account</div>

      <form id="signup-form">
        <div class="form-group"><input type="text" id="signup-name" placeholder="Full name" required></div>
        <div class="form-group"><input type="email" id="signup-email" placeholder="Email address" required autocomplete="email"></div>
        <div class="form-group"><input type="tel" id="signup-phone" placeholder="Phone (optional)"></div>
        <div class="form-group"><input type="password" id="signup-password" placeholder="Password (min 6 characters)" required minlength="6" autocomplete="new-password"></div>
        <button type="submit" class="auth-btn" id="signup-btn"><span class="btn-text">Create Account</span><span class="spinner"></span></button>
        <div class="auth-error" id="signup-error"></div>
        <div class="auth-success" id="signup-success"></div>
      </form>

      <div class="auth-link">Already have an account? <a href="login.html">Sign in</a></div>
      <a href="store.html" class="auth-back">← Continue as Guest</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('signup-btn');
      var errEl = document.getElementById('signup-error');
      var successEl = document.getElementById('signup-success');
      var name = document.getElementById('signup-name').value.trim();
      var email = document.getElementById('signup-email').value.trim();
      var phone = document.getElementById('signup-phone').value.trim();
      var password = document.getElementById('signup-password').value;
      errEl.textContent = '';
      successEl.textContent = '';
      btn.classList.add('loading');
      btn.disabled = true;
      try {
        var data = await YARO_API.signup({ name: name, email: email, phone: phone || undefined, password: password });
        if (data && data.user) {
          successEl.textContent = 'Account created! Check your email to confirm. Redirecting...';
          setTimeout(function() { window.location.href = 'login.html'; }, 2500);
        } else {
          errEl.textContent = (data && data.error) || 'Signup failed. Try again.';
        }
      } catch(e) { errEl.textContent = 'Connection error. Please try again.'; }
      btn.classList.remove('loading');
      btn.disabled = false;
    });
  </script>

</body>
</html>
